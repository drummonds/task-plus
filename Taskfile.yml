version: "3"

tasks:
  fmt:
    cmds:
      - go fmt ./...

  vet:
    cmds:
      - go vet ./...

  test:
    cmds:
      - go test ./...

  check:
    cmds:
      - task: fmt
      - task: vet
      - task: test

  build:
    cmds:
      - go build -o bin/task-release ./cmd/task-release

  deps:tidy:
    cmds:
      - go mod tidy

  clean:
    cmds:
      - rm -rf bin/ dist/

  release:
    desc: Release using task-release (dogfooding). Falls back to local build if not installed.
    cmds:
      - |
        if command -v task-release >/dev/null 2>&1; then
          task-release
        else
          go run ./cmd/task-release
        fi
