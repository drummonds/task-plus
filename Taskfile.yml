version: "3"

tasks:
  fmt:
    cmds:
      - go fmt ./...

  vet:
    cmds:
      - go vet ./...

  test:
    cmds:
      - go test ./...

  check:
    cmds:
      - task: fmt
      - task: vet
      - task: test

  build:
    cmds:
      - go build -o bin/task-plus ./cmd/task-plus

  deps:tidy:
    cmds:
      - go mod tidy

  docs:build:
    cmds:
      - mmdg -i docs/release-workflow.md -o docs/release-workflow.svg -e svg
      - mmdg -i docs/fork-release.md -o docs/fork-release.svg -e svg
      - task-plus md2html --src docs --dst docs

  clean:
    cmds:
      - rm -rf bin/ dist/
