version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/task-release
    binary: task-release
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - format: tar.gz

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
